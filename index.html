<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZZZ — On Air</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fff;
    --edge: #ddd;
    --text: #1a1a1a;
    --dim: #888;
    --amber: #c17f24;
    --amber-bg: #fdf3e0;
    --red: #b33;
    --green: #2a7a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .masthead {
    max-width: 660px;
    margin: 0 auto 36px;
    text-align: center;
  }
  .masthead h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    line-height: 1;
  }
  .masthead .tagline {
    margin-top: 6px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-bar {
    max-width: 660px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--amber-bg);
    border: 1px solid var(--edge);
    border-left: 3px solid var(--amber);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .on-air {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--amber);
    font-weight: 600;
  }
  .led {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
  }
  .led.live {
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .counter { color: var(--dim); }
  .counter .num { font-weight: 600; color: var(--text); }
  .counter.healthy .num { color: var(--green); }
  .counter.medium .num { color: var(--amber); }
  .counter.critical .num { color: var(--red); }

  .rule {
    max-width: 660px;
    margin: 0 auto 32px;
    border: none;
    border-top: 1px solid var(--edge);
  }

  .log {
    max-width: 660px;
    margin: 0 auto;
  }

  .entry {
    background: var(--surface);
    border: 1px solid var(--edge);
    border-radius: 2px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .entry:first-child {
    border-left: 3px solid var(--amber);
  }
  .entry-time {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .entry-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }

  .empty-state {
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    padding: 60px 20px;
  }

  .foot-note {
    max-width: 660px;
    margin: 28px auto 0;
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="masthead">
  <h1>WZZZ</h1>
  <p class="tagline">Independent Radio &mdash; Broadcasting Live</p>
</div>

<div class="status-bar">
  <div class="on-air">
    <span class="led" id="led"></span>
    <span id="status">connecting</span>
  </div>
  <div class="counter" id="counter">
    <span class="num" id="counter-num">--</span> broadcasts remaining
  </div>
</div>

<hr class="rule">

<div class="log" id="log">
  <div class="empty-state">Tuning in&hellip;</div>
</div>

<p class="foot-note">Refreshes every 60 seconds</p>

<script>
  const OWNER  = "unkypaks";
  const REPO   = "AI-Radio";
  const BRANCH = "main";
  const POLL   = 60000;

  let lastSeen = null;

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function toEastern(raw) {
    // Matches "2026-07-13 15:47 UTC"
    const m = raw.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})\s+UTC/);
    if (!m) return raw;
    const d = new Date(m[1] + "T" + m[2] + ":00Z");
    if (isNaN(d)) return raw;
    return d.toLocaleString("en-US", {
      timeZone: "America/New_York",
      month: "short", day: "numeric", year: "numeric",
      hour: "numeric", minute: "2-digit", hour12: true,
      timeZoneName: "short"
    });
  }

  function parseLog(text) {
    // Split on lines of three or more dashes
    const chunks = text.split(/\n-{3,}\n/).map(s => s.trim()).filter(Boolean);
    const entries = [];
    for (const chunk of chunks) {
      // Skip the header block (no timestamp)
      const timeMatch = chunk.match(/\[(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}\s+UTC)\]/);
      if (!timeMatch) continue;
      const time = timeMatch[1];
      // Body is everything after the timestamp line
      const body = chunk.replace(/\[.*?UTC\]\s*/, "").trim();
      entries.push({ time, body });
    }
    return entries.reverse(); // newest first
  }

  function renderLog(entries) {
    const log = document.getElementById("log");
    if (!entries.length) {
      log.innerHTML = '<div class="empty-state">No broadcasts yet.</div>';
      return;
    }
    log.innerHTML = entries.slice(0, 60).map(e => `
      <div class="entry">
        <div class="entry-time">${esc(toEastern(e.time))}</div>
        <div class="entry-body">${esc(e.body)}</div>
      </div>
    `).join("");
  }

  function setCounter(n) {
    const el = document.getElementById("counter");
    document.getElementById("counter-num").textContent = n;
    el.className = "counter " + (n <= 5 ? "critical" : n <= 15 ? "medium" : "healthy");
  }

  async function pollLog() {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/LOG.md?t=${Date.now()}`;
    try {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) {
        document.getElementById("status").textContent = r.status === 404 ? "not yet on air" : "error " + r.status;
        return;
      }
      const text = await r.text();
      const entries = parseLog(text);
      renderLog(entries);
      const newest = entries[0]?.time || null;
      if (newest && newest !== lastSeen) { lastSeen = newest; }
      document.getElementById("led").classList.add("live");
      document.getElementById("status").textContent = "on air";
    } catch {
      document.getElementById("status").textContent = "offline";
    }
  }

  async function pollState() {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/state.json?t=${Date.now()}`;
    try {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) return;
      const s = await r.json();
      if (typeof s.broadcasts_remaining === "number") setCounter(s.broadcasts_remaining);
    } catch { /* counter stays at -- */ }
  }

  pollLog();
  pollState();
  setInterval(pollLog, POLL);
  setInterval(pollState, POLL);
</script>

</body>
</html>
