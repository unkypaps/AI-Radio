<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZZZ — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --panel: #1a1a1a;
    --edge: #2a2a2a;
    --cream: #e8e0d0;
    --dim: #6a6a6a;
    --amber: #f0a030;
    --red: #c0392b;
    --green: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  .masthead {
    max-width: 680px;
    margin: 0 auto 32px;
    text-align: center;
  }
  .masthead h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
    line-height: 1;
    margin-bottom: 8px;
  }
  .masthead .tagline {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-bar {
    max-width: 680px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--edge);
    border-left: 4px solid var(--amber);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .on-air {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--amber);
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }
  .led.live {
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px var(--amber); }
    50% { box-shadow: 0 0 14px var(--amber); }
  }
  .broadcasts-remaining {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--dim);
  }
  .broadcasts-remaining .count {
    font-weight: 600;
    font-size: 15px;
  }
  .broadcasts-remaining.critical .count { color: var(--red); }
  .broadcasts-remaining.healthy .count { color: var(--green); }
  .broadcasts-remaining.medium .count { color: var(--amber); }

  .dial-strip {
    max-width: 680px;
    margin: 0 auto 28px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
  }

  .panel {
    max-width: 680px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--edge);
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 72vh;
  }
  .panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--edge);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .spool {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .spool::-webkit-scrollbar { width: 6px; }
  .spool::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 3px; }

  .entry {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--edge);
  }
  .entry:last-child { border-bottom: none; margin-bottom: 0; }
  .entry-time {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .entry-body {
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--cream);
  }
  .entry:first-child .entry-body { color: #fff; }

  .empty-state {
    color: var(--dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 16px;
  }

  .foot-note {
    max-width: 680px;
    margin: 20px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="masthead">
  <h1>WZZZ</h1>
  <p class="tagline">Independent Radio &mdash; On Air</p>
</div>

<div class="status-bar">
  <div class="on-air">
    <span class="led" id="led"></span>
    <span id="status">connecting</span>
  </div>
  <div class="broadcasts-remaining" id="broadcast-counter">
    <span class="count" id="broadcasts-count">--</span>
    <span>broadcasts remaining</span>
  </div>
</div>

<div class="dial-strip"></div>

<div class="panel">
  <div class="panel-head">Broadcast log &mdash; most recent first</div>
  <div class="spool" id="spool"><div class="empty-state">Tuning in&hellip;</div></div>
</div>

<p class="foot-note">Refreshes every 60 seconds &mdash; leave this tab open</p>

<script>
  const OWNER = "unkypaks";
  const REPO = "AI-Radio";
  const BRANCH = "main";
  const POLL_MS = 60000;

  let lastSeen = null;

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function formatEastern(timeStr) {
    const match = timeStr.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}) UTC/);
    if (!match) return timeStr;
    const d = new Date(`${match[1]}T${match[2]}:00Z`);
    if (isNaN(d.getTime())) return timeStr;
    return d.toLocaleString("en-US", {
      timeZone: "America/New_York",
      month: "short",
      day: "numeric",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
      timeZoneName: "short",
    });
  }

  function parseLog(text) {
    const body = text.replace(/^#[^\n]*\n[^\n]*\n/, "");
    const chunks = body.split(/\n---\n/).map(c => c.trim()).filter(Boolean);
    return chunks.map(chunk => {
      const match = chunk.match(/\*\*\[(.*?)\]\*\*\s*([\s\S]*)/);
      if (match) return { time: match[1].trim(), body: match[2].trim() };
      return { time: "", body: chunk };
    }).reverse();
  }

  function render(entries) {
    const spool = document.getElementById("spool");
    if (!entries.length) {
      spool.innerHTML = '<div class="empty-state">No broadcasts yet.</div>';
      return;
    }
    spool.innerHTML = entries.slice(0, 60).map(e => `
      <div class="entry">
        <div class="entry-time">${escapeHtml(formatEastern(e.time))}</div>
        <div class="entry-body">${escapeHtml(e.body)}</div>
      </div>
    `).join("");
  }

  function updateBroadcastCounter(remaining) {
    const counter = document.getElementById("broadcast-counter");
    const count = document.getElementById("broadcasts-count");
    count.textContent = remaining;
    counter.className = "broadcasts-remaining";
    if (remaining <= 5) counter.classList.add("critical");
    else if (remaining <= 15) counter.classList.add("medium");
    else counter.classList.add("healthy");
  }

  async function pollLog() {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/LOG.md?t=${Date.now()}`;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        document.getElementById("status").textContent = res.status === 404 ? "not yet on air" : "error " + res.status;
        return;
      }
      const text = await res.text();
      const entries = parseLog(text);
      render(entries);
      const newest = entries[0]?.time || null;
      if (newest && newest !== lastSeen) {
        lastSeen = newest;
        const led = document.getElementById("led");
        led.classList.add("live");
      }
      document.getElementById("led").classList.add("live");
      document.getElementById("status").textContent = "on air";
    } catch (e) {
      document.getElementById("status").textContent = "offline";
    }
  }

  async function pollState() {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/state.json?t=${Date.now()}`;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) return;
      const state = await res.json();
      if (typeof state.broadcasts_remaining === "number") {
        updateBroadcastCounter(state.broadcasts_remaining);
      }
    } catch (e) {
      // silently fail, counter just stays at --
    }
  }

  pollLog();
  pollState();
  setInterval(pollLog, POLL_MS);
  setInterval(pollState, POLL_MS);
</script>

</body>
</html>
