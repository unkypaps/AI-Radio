name: WZZZ Broadcast

on:
  schedule:
    - cron: "0 14 * * *"   # once daily at 2pm UTC (10am Eastern)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the station
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python radio_station.py

      - name: Commit and push
        run: |
          git config user.name "WZZZ Bot"
          git config user.email "actions@github.com"
          git add LOG.md state.json AUDIENCE.md
          git diff --quiet --cached || git commit -m "Broadcast"
          git pull --rebase origin main
          git push
